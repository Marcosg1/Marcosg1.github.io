<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D3 Force-Directed Graph</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    .link {
      stroke: grey;
    }

    .node {
      fill: steelblue;
      cursor: pointer;
    }

    .tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 6px 10px;
      border-radius: 5px;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
    }
  </style>
</head>

<body>
  <div id="chart-container"></div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    // gets the data from the 2 csv files
    Promise.all([
      d3.csv("../fb-pages-food/fb-pages-food-nodes.csv"),
      d3.csv("../fb-pages-food/fb-pages-food-edges.csv"),
    ]).then(([nodes, links]) => {

      // converts the ids to numbers
      nodes.forEach(d => {
        d.id = +d.id;
      });

      // converts the source and target ids to numbers
      links.forEach(d => {
        d.source = +d.source;
        d.target = +d.target;
      });

      // creates the svg container
      const svgWidth = 1200;
      const svgHeight = 700;
      const margin = { top: 40, right: 150, bottom: 70, left: 100 };
      const width = svgWidth - margin.left - margin.right;
      const height = svgHeight - margin.top - margin.bottom;

      const tooltip = d3.select("#tooltip");

      const svg = d3.select("#chart-container")
        .append("svg")
        .attr("width", svgWidth)
        .attr("height", svgHeight);

      const chart = svg.append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      // creates the simulation
      const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id))
        .force("charge", d3.forceManyBody().strength(-100))
        .force("center", d3.forceCenter(width / 2, height / 2));

      // creates the links
      const link = chart
        .selectAll(".link")
        .data(links)
        .enter()
        .append("line")
        .attr("class", "link");

      // creates the nodes, nodes can be draged
      const node = chart
        .selectAll(".node")
        .data(nodes)
        .enter()
        .append("circle")
        .attr("class", "node")
        .attr("r", 8)
        .on("mouseover", (event, d) => {
          tooltip
            .style("opacity", 1)
            .html(`<strong>${d.name}</strong>`)
            .style("left", (event.pageX + 10) + "px")
            .style("top", (event.pageY - 20) + "px");
        })
        .on("mousemove", (event) => {
          tooltip
            .style("left", (event.pageX + 10) + "px")
            .style("top", (event.pageY - 20) + "px");
        })
        .on("mouseout", (event) => {
          tooltip.style("opacity", 0);
        })
        .call(
          d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", endDragging)
        );

      // fits the graph all in the view
      const nodeSize = 8;
      function fitPage() {
        const pad = 24;
        const minX = d3.min(nodes, d => d.x) - nodeSize;
        const maxX = d3.max(nodes, d => d.x) + nodeSize;
        const minY = d3.min(nodes, d => d.y) - nodeSize;
        const maxY = d3.max(nodes, d => d.y) + nodeSize;
        const bx0 = margin.left + minX - pad;
        const by0 = margin.top + minY - pad;
        const bw = Math.max(maxX - minX + 2 * pad, 1);
        const bh = Math.max(maxY - minY + 2 * pad, 1);
        svg.attr("viewBox", `${bx0} ${by0} ${bw} ${bh}`);
      }

      // updates the links and nodes
      simulation.on("tick", () => {
        node
          .attr("cx", d => d.x)
          .attr("cy", d => d.y);
        link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);
      });

      // fits the graph all in the view after the simulation ends
      simulation.on("end", fitPage);

      // starts the dragging
      function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
      }

      // drags the node
      function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
      }

      // ends the dragging
      function endDragging(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      }

    });
  </script>
</body>

</html>
